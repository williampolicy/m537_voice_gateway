{{- if and .Values.apiKeys.keys (not .Values.apiKeys.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "m537-voice-gateway.fullname" . }}-api-keys
  labels:
    {{- include "m537-voice-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-keys.json: |
    {
      "keys": [
        {{- range $index, $key := .Values.apiKeys.keys }}
        {{- if $index }},{{ end }}
        {
          "name": {{ $key.name | quote }},
          "key": {{ $key.key | quote }},
          "tier": {{ $key.tier | default "standard" | quote }}
        }
        {{- end }}
      ]
    }
{{- end }}
---
{{- if .Values.sentry.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "m537-voice-gateway.fullname" . }}-sentry
  labels:
    {{- include "m537-voice-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  SENTRY_DSN: {{ .Values.sentry.dsn | quote }}
{{- end }}
