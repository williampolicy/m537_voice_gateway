<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Microphone Icon -->
  <g fill="white" transform="translate(156, 100)">
    <!-- Mic body -->
    <rect x="60" y="0" width="80" height="180" rx="40"/>
    <!-- Mic stand -->
    <path d="M100 200 L100 280 M60 280 L140 280" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Sound waves -->
    <path d="M20 90 Q0 140 20 190" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M180 90 Q200 140 180 190" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- M537 Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">M537</text>
</svg>
