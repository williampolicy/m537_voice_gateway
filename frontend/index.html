<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M537 语音生态入口 | LIGHT HOPE</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="LIGHT HOPE Voice Gateway - Natural language server access">
    <meta name="theme-color" content="#4a90d9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="M537 Voice">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/icon-16x16.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
</head>
<body>
    <!-- Skip link for keyboard accessibility -->
    <a href="#chatContainer" class="skip-link">跳至主要内容</a>

    <!-- Connection status indicator -->
    <div class="connection-status" id="connectionStatus" role="status" aria-live="polite"></div>

    <!-- Offline banner -->
    <div class="offline-banner" id="offlineBanner" role="alert">
        <span>网络已断开 - 部分功能可能不可用</span>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>M537 语音生态入口</h1>
            <p class="subtitle">LIGHT HOPE Voice Gateway</p>
        </header>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <p>你好！我是 M537 语音助手。</p>
                <p>点击下方按钮开始说话，或点击快捷问题。</p>
            </div>
        </div>

        <!-- Current Input Display -->
        <div class="input-display" id="inputDisplay">
            <span class="label">当前输入：</span>
            <span class="text" id="currentInput">等待录音...</span>
        </div>

        <!-- Voice Visualizer -->
        <div class="visualizer-container">
            <canvas id="voiceVisualizer" class="voice-visualizer"></canvas>
        </div>

        <!-- Record Button -->
        <div class="record-section">
            <button class="record-button" id="recordButton" aria-label="录音">
                <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <svg class="stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
            </button>
            <div class="record-status" id="recordStatus">点击开始录音</div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <p class="quick-title">快捷问题：</p>
            <div class="quick-buttons">
                <button class="quick-btn" data-query="现在有多少个项目">项目数</button>
                <button class="quick-btn" data-query="系统状态怎么样">系统状态</button>
                <button class="quick-btn" data-query="当前有哪些端口在监听">端口</button>
                <button class="quick-btn" data-query="最近有什么错误">错误</button>
                <button class="quick-btn" data-query="P0服务状态如何">P0状态</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>LIGHT HOPE LLC | EMPOWER GOOD WITH AI</p>
            <p class="version">V1.0.0 | V5.3 Compliant</p>
        </footer>
    </div>

    <!-- Toast notifications container -->
    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/voice-visualizer.js"></script>
    <script src="js/voice-input.js"></script>
    <script src="js/voice-output.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/websocket-client.js"></script>
    <script src="js/keyboard-shortcuts.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('[App] Service Worker registered:', registration.scope);

                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                    if (confirm('新版本可用，是否刷新？')) {
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('[App] Service Worker registration failed:', error);
                    });
            });
        }

        // Handle offline/online events
        const offlineBanner = document.getElementById('offlineBanner');
        const connectionStatus = document.getElementById('connectionStatus');

        window.addEventListener('online', () => {
            document.body.classList.remove('offline');
            offlineBanner.classList.remove('visible');
            connectionStatus.className = 'connection-status connected';
            setTimeout(() => connectionStatus.className = 'connection-status', 2000);
            console.log('[App] Back online');
        });

        window.addEventListener('offline', () => {
            document.body.classList.add('offline');
            offlineBanner.classList.add('visible');
            connectionStatus.className = 'connection-status disconnected';
            console.log('[App] Gone offline');
        });

        // Initial connection check
        if (!navigator.onLine) {
            offlineBanner.classList.add('visible');
            connectionStatus.className = 'connection-status disconnected';
        }
    </script>
</body>
</html>
